<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Lost in Space</title>
    <style>
        /* Base styles to center content */
        body {
            background-color: #0b0f19;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            text-align: center;
        }

        .container {
            max-width: 600px;
            padding: 20px;
            position: relative;
            z-index: 2;
        }

        /* Large error number */
        h1 {
            font-size: 8rem;
            margin: 0;
            font-weight: 900;
            letter-spacing: 5px;
            background: linear-gradient(45deg, #ff6b6b, #4ecdc4);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }

        h2 {
            font-size: 2rem;
            margin: 10px 0 20px 0;
        }

        p {
            color: #a0aec0;
            font-size: 1.1rem;
            line-height: 1.6;
            margin-bottom: 30px;
        }

        /* Interactive home button */
        .btn {
            display: inline-block;
            padding: 12px 30px;
            background: linear-gradient(45deg, #4ecdc4, #556270);
            color: white;
            text-decoration: none;
            border-radius: 30px;
            font-weight: bold;
            transition: transform 0.2s, box-shadow 0.2s;
        }

        .btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 10px 20px rgba(78, 205, 196, 0.4);
        }

        /* Floating astronaut animation */
        .astronaut {
            width: 150px;
            margin: 0 auto 30px auto;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0% { transform: translateY(0px) rotate(0deg); }
            50% { transform: translateY(-20px) rotate(5deg); }
            100% { transform: translateY(0px) rotate(0deg); }
        }

        /* Background star elements */
        .star {
            position: absolute;
            background-color: white;
            border-radius: 50%;
            animation: twinkle 2s infinite ease-in-out;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }
    </style>
</head>
<body>

    <!-- Background Stars -->
    <div class="star" style="top: 20%; left: 10%; width: 2px; height: 2px; animation-delay: 0.1s;"></div>
    <div class="star" style="top: 75%; left: 15%; width: 3px; height: 3px; animation-delay: 0.5s;"></div>
    <div class="star" style="top: 40%; left: 80%; width: 2px; height: 2px; animation-delay: 1s;"></div>
    <div class="star" style="top: 85%; left: 70%; width: 4px; height: 4px; animation-delay: 1.5s;"></div>

    <div class="container">
        <!-- SVG Floating Astronaut Logo -->
        <svg class="astronaut" viewBox="0 0 24 24" fill="none" stroke="#4ecdc4" stroke-width="1" stroke-linecap="round" stroke-linejoin="round">
            <path d="M12 2a5 5 0 0 0-5 5v3a5 5 0 0 0 10 0V7a5 5 0 0 0-5-5z"/>
            <path d="M19 10v1a7 7 0 0 1-14 0v-1"/>
            <path d="M12 18v4"/>
            <path d="M8 22h8"/>
            <circle cx="12" cy="7" r="1" fill="#ff6b6b"/>
        </svg>

        <h1>404</h1>
        <h2>Lost in Space</h2>
        <p>The page you are looking for has drifted into a black hole. It does not exist, or it moved to another galaxy.</p>
        <a href="/" class="btn">Return to Earth</a>
    </div>

</body>
</html>
